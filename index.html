<!DOCTYPE html>
<html>

<head>
<title>Car Price Predictor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row">
<div class="card mt-5">

<div class="card-header text-center">
<h1>🚗 Car Price Predictor</h1>
</div>

<div class="card-body">

<form method="post" action="/predict">

<div class="row">

<div class="col-md-6">
<label><b>Select Company</b></label>
<select class="form-control" name="company">

{% for company in companies %}

<option value="{{company}}">{{company}}</option>

{% endfor %}

</select>
</div>

<div class="col-md-6">
<label><b>Select Car Model</b></label>
<select class="form-control" name="car_models">

{% for car_model in car_models %}

<option value="{{car_model}}">{{car_model}}</option>

{% endfor %}

</select>
</div>

</div>

<br>

<div class="row">

<div class="col-md-4">
<label><b>Select Year</b></label>
<select class="form-control" name="year">

{% for year in years %}

<option value="{{year}}">{{year}}</option>

{% endfor %}

</select>
</div>

<div class="col-md-4">
<label><b>Select Fuel Type</b></label>
<select class="form-control" name="fuel_type">

{% for fuel in fuel_types %}

<option value="{{fuel}}">{{fuel}}</option>

{% endfor %}

</select>
</div>

<div class="col-md-4">
<label><b>Kilometers Driven</b></label>
<input type="text" class="form-control" name="kilo_driven">
</div>

</div>

<br>

<div class="text-center">
<button class="btn btn-primary btn-lg">Predict Price</button>
<br>

{% if prediction_text %}

<div class="alert alert-success text-center">

<h3>{{prediction_text}}</h3>

</div>

{% endif %}
</div>

</form>

</div>

</div>
</div>

</div>

</body>
</html>
